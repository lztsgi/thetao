name: mihomo

on:
  workflow_dispatch:
  schedule:
    - cron: "0 20 * * *"

permissions:
  contents: write

concurrency:
  group: rules-main
  cancel-in-progress: false

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Mihomo
        shell: bash
        run: |
          set -Eeuo pipefail
          curl -L -o mihomo.deb https://github.com/MetaCubeX/mihomo/releases/download/v1.19.23/mihomo-linux-amd64-v1.19.23.deb
          mkdir -p temp_deb
          dpkg -x mihomo.deb temp_deb
          mv temp_deb/usr/bin/mihomo ./mihomo-bin
          chmod +x mihomo-bin
          rm -rf temp_deb mihomo.deb

      - name: Process Rules
        shell: bash
        run: |
          set -Eeuo pipefail

          INPUT_FILE="mihomo/mihomo.txt"
          TARGET_ROOT="mihomo/rule-set"
          TARGET_GEOSITE="$TARGET_ROOT/geosite"
          TARGET_GEOIP="$TARGET_ROOT/geoip"
          TARGET_CLASSICAL="$TARGET_ROOT/classical"
          DEFAULT_OTHER_DIR="$TARGET_ROOT/other-rule"

          TMP_ROOT="mihomo/.tmp_rule_set"
          TMP_GEOSITE="$TMP_ROOT/geosite"
          TMP_GEOIP="$TMP_ROOT/geoip"
          CACHE_DIR="mihomo/.cache"

          if [[ ! -f "$INPUT_FILE" ]]; then
            echo "Missing input file: $INPUT_FILE"
            exit 1
          fi

          rm -rf "$TMP_ROOT" "$CACHE_DIR"
          mkdir -p "$TMP_GEOSITE" "$TMP_GEOIP" "$TARGET_CLASSICAL" "$CACHE_DIR" "$DEFAULT_OTHER_DIR"

          # =========================================================
          # 1) 路径规范化
          #    支持：
          #    other-rule
          #    rule-set/other
          #    /rule-set/other
          #    ./rule-set/other
          #    最终都会落到仓库内的 mihomo/... 目录
          # =========================================================
          normalize_repo_relative_dir() {
            local input="${1:-}"
            local default_dir="${2:-mihomo/rule-set/other-rule}"
            local p=""

            if [[ -z "$input" ]]; then
              echo "$default_dir"
              return
            fi

            p="$input"
            p="${p//\\//}"

            while [[ "$p" == /* ]]; do
              p="${p#/}"
            done

            while [[ "$p" == ./* ]]; do
              p="${p#./}"
            done

            if [[ -z "$p" ]]; then
              echo "$default_dir"
              return
            fi

            if [[ "$p" != mihomo/* ]]; then
              p="mihomo/$p"
            fi

            echo "$p"
          }

          # =========================================================
          # 2) 解析特殊链接
          #    只处理 fragment：
          #    #release-assets@/rule-set/other
          # =========================================================
          parse_special_link() {
            local raw="$1"
            local clean_link="$raw"
            local fragment=""
            local mode=""
            local output_subdir=""

            if [[ "$raw" == *"#"* ]]; then
              clean_link="${raw%%#*}"
              fragment="${raw#*#}"
            fi

            if [[ -n "$fragment" ]]; then
              mode="${fragment%%@*}"
              if [[ "$fragment" == *"@"* ]]; then
                output_subdir="${fragment#*@}"
              fi
            fi

            printf '%s\n%s\n%s\n' "$clean_link" "$mode" "$output_subdir"
          }

          # =========================================================
          # 3) 下载 GitHub Release Assets
          #    - 排除 Source code
          #    - 下载到指定目录
          # =========================================================
          download_github_release_assets() {
            local tag_url="$1"
            local output_dir="$2"

            mkdir -p "$output_dir"

            local clean_url="$tag_url"
            clean_url="${clean_url%%#*}"

            if [[ ! "$clean_url" =~ ^https://github\.com/([^/]+)/([^/]+)/releases/tag/([^/#]+)$ ]]; then
              echo "Error: invalid GitHub release tag URL: $tag_url"
              return 1
            fi

            local owner="${BASH_REMATCH[1]}"
            local repo="${BASH_REMATCH[2]}"
            local tag="${BASH_REMATCH[3]}"
            local api_url="https://api.github.com/repos/${owner}/${repo}/releases/tags/${tag}"

            local api_json
            if ! api_json="$(curl -sL -f --max-time 60 \
              -H 'Accept: application/vnd.github+json' \
              -H 'User-Agent: Mozilla/5.0' \
              "$api_url")"; then
              echo "Error: failed to fetch release metadata: $api_url"
              return 1
            fi

            python3 - "$output_dir" <<'PY' <<< "$api_json"
import json
import os
import sys
import urllib.request

output_dir = sys.argv[1]
data = json.load(sys.stdin)

assets = data.get("assets", [])
for asset in assets:
    name = (asset.get("name") or "").strip()
    url = asset.get("browser_download_url")
    if not name or not url:
        continue
    if name.startswith("Source code") or name in {"Source code (zip)", "Source code (tar.gz)"}:
        continue

    save_path = os.path.join(output_dir, name)
    req = urllib.request.Request(
        url,
        headers={
            "User-Agent": "Mozilla/5.0",
            "Accept": "application/octet-stream"
        }
    )
    with urllib.request.urlopen(req, timeout=120) as resp, open(save_path, "wb") as f:
        f.write(resp.read())
    print(f"Downloaded: {save_path}")
PY
          }

          # =========================================================
          # 4) 主循环
          #    - 普通链接：保持你原来的逻辑
          #    - release-assets：走下载分支
          # =========================================================
          while IFS= read -r line || [[ -n "$line" ]]; do
            [[ "$line" =~ ^[[:space:]]*#.*$ ]] && continue
            [[ -z "${line//[[:space:]]/}" ]] && continue

            mapfile -t SPECIAL_PARTS < <(parse_special_link "$line")
            CLEAN_LINE="${SPECIAL_PARTS[0]}"
            SPECIAL_MODE="${SPECIAL_PARTS[1]}"
            SPECIAL_OUTPUT="${SPECIAL_PARTS[2]}"

            # -------------------------------------------------------
            # 特殊模式：下载 release assets 到指定目录
            # 用法：
            # https://github.com/.../releases/tag/xxx#release-assets@/rule-set/other
            # -------------------------------------------------------
            if [[ "$SPECIAL_MODE" == "release-assets" ]]; then
              TARGET_OTHER_DIR="$(normalize_repo_relative_dir "$SPECIAL_OUTPUT" "$DEFAULT_OTHER_DIR")"
              mkdir -p "$TARGET_OTHER_DIR"

              echo "Processing release assets: $CLEAN_LINE -> $TARGET_OTHER_DIR"

              if ! download_github_release_assets "$CLEAN_LINE" "$TARGET_OTHER_DIR"; then
                echo "Error: release assets download failed for $line"
              fi

              continue
            fi

            URL=""
            FILENAME=""

            if [[ "$line" == *"@"* ]]; then
              LAST_PART="${line##*@}"
              if [[ "$LAST_PART" != */* ]]; then
                URL="${line%@*}"
                FILENAME="$LAST_PART"
              else
                URL="$line"
                FILENAME="$(basename "$URL")"
                FILENAME="${FILENAME%%\?*}"
                FILENAME="${FILENAME%.*}"
              fi
            else
              URL="$line"
              FILENAME="$(basename "$URL")"
              FILENAME="${FILENAME%%\?*}"
              FILENAME="${FILENAME%.*}"
            fi

            FILENAME="$(echo "$FILENAME" | tr -cd '[:alnum:]_-')"
            [[ -z "$FILENAME" ]] && FILENAME="rule_$(date +%s)"

            RAW_FILE="$CACHE_DIR/${FILENAME}.txt"
            DEST_TXT=""
            DEST_MRS=""
            BEHAVIOR=""

            echo "Processing: $URL -> $FILENAME"

            if ! curl -sL -f --max-time 30 "$URL" -o "$RAW_FILE"; then
              echo "Error: Failed to download $URL"
              rm -f "$RAW_FILE"
              continue
            fi

            if [[ ! -s "$RAW_FILE" ]]; then
              echo "Error: Downloaded file is empty for $URL"
              rm -f "$RAW_FILE"
              continue
            fi

            # 按你原版逻辑判断：
            # 只要文件里命中 IP 特征，就归 geoip；否则归 geosite
            if grep -qE "^[[:space:]]*(IP-CIDR|IP-CIDR6|IP-ASN|SRC-IP-CIDR)" "$RAW_FILE" || \
               grep -qE "^[[:space:]]*-[[:space:]]+(IP-CIDR|IP-CIDR6|IP-ASN|SRC-IP-CIDR)" "$RAW_FILE" || \
               grep -qE "^[[:space:]]*([0-9]{1,3}\.){3}[0-9]{1,3}/[0-9]{1,2}[[:space:]]*$" "$RAW_FILE" || \
               grep -qE "^[[:space:]]*([0-9a-fA-F]{0,4}:){2,7}[0-9a-fA-F]{0,4}/[0-9]{1,3}[[:space:]]*$" "$RAW_FILE"; then
              BEHAVIOR="ipcidr"
              DEST_TXT="$TMP_GEOIP/${FILENAME}.txt"
              DEST_MRS="$TMP_GEOIP/${FILENAME}.mrs"
            else
              BEHAVIOR="domain"
              DEST_TXT="$TMP_GEOSITE/${FILENAME}.txt"
              DEST_MRS="$TMP_GEOSITE/${FILENAME}.mrs"
            fi

            # 原文不改，直接落盘成 .txt
            cp "$RAW_FILE" "$DEST_TXT"

            # 只做一件事：尝试从原文 txt 生成 mrs
            # 如果源本身不符合 mihomo 可直接编译的 text 格式，就保留 txt，不洗内容硬改
            if ./mihomo-bin convert-ruleset "$BEHAVIOR" text "$DEST_TXT" "$DEST_MRS"; then
              MRS_SIZE="$(stat -c%s "$DEST_MRS" 2>/dev/null || echo "0")"
              echo "✓ Success: $FILENAME ($BEHAVIOR) -> ${MRS_SIZE} bytes"
            else
              echo "⚠ Warning: convert-ruleset failed for $FILENAME ($BEHAVIOR), keep raw txt only"
              rm -f "$DEST_MRS"
            fi

            rm -f "$RAW_FILE"
          done < "$INPUT_FILE"

          # =========================================================
          # 5) 回写目录
          #    保持你原来的 geosite / geoip 更新方式
          # =========================================================
          mkdir -p "$TARGET_ROOT"
          rm -rf "$TARGET_GEOSITE" "$TARGET_GEOIP"
          mv "$TMP_GEOSITE" "$TARGET_GEOSITE"
          mv "$TMP_GEOIP" "$TARGET_GEOIP"
          mkdir -p "$TARGET_CLASSICAL"

          rm -rf "$TMP_ROOT" "$CACHE_DIR"

      - name: Verify Rules
        shell: bash
        run: |
          set -Eeuo pipefail

          echo "=== Conversion Summary ==="
          echo

          TOTAL_FILES=0
          TOTAL_SIZE=0

          for f in mihomo/rule-set/geoip/*.mrs mihomo/rule-set/geosite/*.mrs; do
            [ -f "$f" ] || continue
            REL="${f#mihomo/rule-set/}"
            SIZE="$(stat -c%s "$f" 2>/dev/null || echo "0")"
            echo "  $REL -> ${SIZE} bytes"
            TOTAL_FILES=$((TOTAL_FILES + 1))
            TOTAL_SIZE=$((TOTAL_SIZE + SIZE))
          done

          echo
          echo "Total mrs files: $TOTAL_FILES, $TOTAL_SIZE bytes"

      - name: Commit and push config
        shell: bash
        run: |
          set -Eeuo pipefail
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"

          git add -A ./mihomo/rule-set

          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update mihomo rules"
          git pull --rebase origin main
          git push origin HEAD:main
