name: mihomo

on:
  workflow_dispatch:
  schedule:
    - cron: "0 20 * * *"

permissions:
  contents: write

concurrency:
  group: rules-main
  cancel-in-progress: false

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Mihomo
        shell: bash
        run: |
          set -Eeuo pipefail
          curl -L -o mihomo.deb https://github.com/MetaCubeX/mihomo/releases/download/v1.19.23/mihomo-linux-amd64-v1.19.23.deb
          mkdir -p temp_deb
          dpkg -x mihomo.deb temp_deb
          mv temp_deb/usr/bin/mihomo ./mihomo-bin
          chmod +x mihomo-bin
          rm -rf temp_deb mihomo.deb

      - name: Process Rules
        shell: bash
        run: |
          set -Eeuo pipefail

          INPUT_FILE="mihomo/mihomo.txt"
          TARGET_ROOT="mihomo/rule-set"
          TARGET_GEOSITE="$TARGET_ROOT/geosite"
          TARGET_GEOIP="$TARGET_ROOT/geoip"
          TARGET_CLASSICAL="$TARGET_ROOT/classical"

          TMP_ROOT="mihomo/.tmp_rule_set"
          TMP_GEOSITE="$TMP_ROOT/geosite"
          TMP_GEOIP="$TMP_ROOT/geoip"
          CACHE_DIR="mihomo/.cache"

          if [[ ! -f "$INPUT_FILE" ]]; then
            echo "Missing input file: $INPUT_FILE"
            exit 1
          fi

          rm -rf "$TMP_ROOT" "$CACHE_DIR"
          mkdir -p "$TMP_GEOSITE" "$TMP_GEOIP" "$TARGET_CLASSICAL" "$CACHE_DIR" "$TARGET_ROOT"

          ######################################################################
          # 模块 1：基础工具
          ######################################################################

          sanitize_name() {
            local name="$1"
            name="$(echo "$name" | tr -cd '[:alnum:]_.-')"
            [[ -z "$name" ]] && name="rule_$(date +%s)"
            echo "$name"
          }

          get_basename_no_query() {
            local url="$1"
            local name
            name="$(basename "$url")"
            name="${name%%\?*}"
            echo "$name"
          }

          strip_ext() {
            local name="$1"
            echo "${name%.*}"
          }

          ensure_dir() {
            local dir="$1"
            mkdir -p "$dir"
          }

          ######################################################################
          # 模块 2：解析 mihomo.txt
          #
          # 支持：
          # 1) URL
          # 2) URL@filename
          # 3) URL@dir/subdir
          # 4) URL#release-assets@dir/subdir
          ######################################################################

          parse_line() {
            local line="$1"

            PARSED_URL=""
            PARSED_TAIL=""
            PARSED_MODE="normal"   # normal | release-assets
            PARSED_KIND="auto"     # auto | filename | dir

            line="$(echo "$line" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"

            if [[ "$line" == *"@"* ]]; then
              PARSED_URL="${line%@*}"
              PARSED_TAIL="${line##*@}"
            else
              PARSED_URL="$line"
              PARSED_TAIL=""
            fi

            if [[ "$PARSED_URL" == *"#release-assets" ]]; then
              PARSED_MODE="release-assets"
              PARSED_URL="${PARSED_URL%\#release-assets}"
            fi

            if [[ -n "$PARSED_TAIL" ]]; then
              if [[ "$PARSED_TAIL" == */* ]]; then
                PARSED_KIND="dir"
              else
                PARSED_KIND="filename"
              fi
            fi
          }

          ######################################################################
          # 模块 3：规则类型识别
          ######################################################################

          detect_behavior() {
            local raw_file="$1"

            if grep -qE "^[[:space:]]*(IP-CIDR|IP-CIDR6|IP-ASN|SRC-IP-CIDR)" "$raw_file" || \
               grep -qE "^[[:space:]]*-[[:space:]]+(IP-CIDR|IP-CIDR6|IP-ASN|SRC-IP-CIDR)" "$raw_file" || \
               grep -qE "^[[:space:]]*([0-9]{1,3}\.){3}[0-9]{1,3}/[0-9]{1,2}[[:space:]]*$" "$raw_file" || \
               grep -qE "^[[:space:]]*([0-9a-fA-F]{0,4}:){2,7}[0-9a-fA-F]{0,4}/[0-9]{1,3}[[:space:]]*$" "$raw_file"; then
              echo "ipcidr"
            else
              echo "domain"
            fi
          }

          ######################################################################
          # 模块 4：普通链接下载并按原逻辑转换
          ######################################################################

          process_normal_url() {
            local url="$1"
            local tail="$2"
            local kind="$3"

            local filename=""
            local raw_file=""
            local behavior=""
            local dest_txt=""
            local dest_mrs=""

            if [[ "$kind" == "filename" ]]; then
              filename="$(sanitize_name "$tail")"
            else
              filename="$(strip_ext "$(get_basename_no_query "$url")")"
              filename="$(sanitize_name "$filename")"
            fi

            raw_file="$CACHE_DIR/${filename}.txt"

            echo "Processing normal url: $url -> $filename"

            if ! curl -sL -f --max-time 120 "$url" -o "$raw_file"; then
              echo "Error: Failed to download $url"
              rm -f "$raw_file"
              return 0
            fi

            if [[ ! -s "$raw_file" ]]; then
              echo "Error: Downloaded file is empty for $url"
              rm -f "$raw_file"
              return 0
            fi

            behavior="$(detect_behavior "$raw_file")"

            if [[ "$behavior" == "ipcidr" ]]; then
              dest_txt="$TMP_GEOIP/${filename}.txt"
              dest_mrs="$TMP_GEOIP/${filename}.mrs"
            else
              dest_txt="$TMP_GEOSITE/${filename}.txt"
              dest_mrs="$TMP_GEOSITE/${filename}.mrs"
            fi

            cp "$raw_file" "$dest_txt"

            if ./mihomo-bin convert-ruleset "$behavior" text "$dest_txt" "$dest_mrs"; then
              local mrs_size
              mrs_size="$(stat -c%s "$dest_mrs" 2>/dev/null || echo "0")"
              echo "Success: $filename ($behavior) -> ${mrs_size} bytes"
            else
              echo "Warning: convert-ruleset failed for $filename ($behavior), keep raw txt only"
              rm -f "$dest_mrs"
            fi

            rm -f "$raw_file"
          }

          ######################################################################
          # 模块 5：release assets 下载
          ######################################################################

          is_convertible_rule_file() {
            local file="$1"
            local lower
            lower="$(echo "$file" | tr '[:upper:]' '[:lower:]')"
            [[ "$lower" =~ \.(list|txt|yaml|yml)$ ]]
          }

          try_convert_downloaded_rule() {
            local saved_file="$1"

            local filename
            local stem
            local behavior
            local mrs_file

            filename="$(basename "$saved_file")"
            stem="${filename%.*}"
            behavior="$(detect_behavior "$saved_file")"
            mrs_file="$(dirname "$saved_file")/${stem}.mrs"

            if ./mihomo-bin convert-ruleset "$behavior" text "$saved_file" "$mrs_file"; then
              local size
              size="$(stat -c%s "$mrs_file" 2>/dev/null || echo "0")"
              echo "Converted release asset: $filename ($behavior) -> ${size} bytes"
            else
              echo "Warning: convert-ruleset failed for release asset $filename, keep raw file only"
              rm -f "$mrs_file"
            fi
          }

          fetch_release_assets() {
            local url="$1"
            local target_subdir="$2"

            local final_dir
            local api_url
            local json_file
            local asset_list

            if [[ -z "$target_subdir" ]]; then
              target_subdir="rule-set/other-rule"
            fi

            final_dir="mihomo/${target_subdir}"
            ensure_dir "$final_dir"

            json_file="$CACHE_DIR/release_api_$(date +%s%N).json"
            asset_list="$CACHE_DIR/release_assets_$(date +%s%N).txt"

            echo "Fetching release assets: $url -> $final_dir"

            if [[ "$url" =~ ^https://github\.com/([^/]+)/([^/]+)/releases/tag/(.+)$ ]]; then
              local owner repo tag
              owner="${BASH_REMATCH[1]}"
              repo="${BASH_REMATCH[2]}"
              tag="${BASH_REMATCH[3]}"
              api_url="https://api.github.com/repos/${owner}/${repo}/releases/tags/${tag}"
            else
              echo "Error: Unsupported release url format: $url"
              return 0
            fi

            if ! curl -sL -f \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                --max-time 120 \
                "$api_url" -o "$json_file"; then
              echo "Error: Failed to fetch GitHub release API: $api_url"
              rm -f "$json_file" "$asset_list"
              return 0
            fi

            grep -oE '"browser_download_url":[[:space:]]*"[^"]+"' "$json_file" | \
              sed -E 's/^"browser_download_url":[[:space:]]*"//; s/"$//' | \
              grep -Ev '/(source\.zip|source\.tar\.gz)$' | \
              sort -u > "$asset_list" || true

            if [[ ! -s "$asset_list" ]]; then
              echo "Warning: No release assets found from API for $url"
              echo "API response preview:"
              head -c 800 "$json_file" || true
              echo
              rm -f "$json_file" "$asset_list"
              return 0
            fi

            while IFS= read -r asset_url || [[ -n "$asset_url" ]]; do
              [[ -z "${asset_url//[[:space:]]/}" ]] && continue

              local asset_name
              local asset_path

              asset_name="$(basename "${asset_url%%\?*}")"
              asset_name="$(sanitize_name "$asset_name")"
              asset_path="$final_dir/$asset_name"

              echo "Downloading asset: $asset_url -> $asset_path"

              if ! curl -sL -f --max-time 300 "$asset_url" -o "$asset_path"; then
                echo "Warning: Failed to download asset $asset_url"
                rm -f "$asset_path"
                continue
              fi

              if [[ ! -s "$asset_path" ]]; then
                echo "Warning: Empty asset skipped: $asset_name"
                rm -f "$asset_path"
                continue
              fi

              if is_convertible_rule_file "$asset_name"; then
                try_convert_downloaded_rule "$asset_path"
              fi
            done < "$asset_list"

            rm -f "$json_file" "$asset_list"
          }

          ######################################################################
          # 模块 6：主循环
          ######################################################################

          while IFS= read -r line || [[ -n "$line" ]]; do
            [[ "$line" =~ ^[[:space:]]*#.*$ ]] && continue
            [[ -z "${line//[[:space:]]/}" ]] && continue

            parse_line "$line"

            if [[ "$PARSED_MODE" == "release-assets" ]]; then
              fetch_release_assets "$PARSED_URL" "$PARSED_TAIL"
            else
              process_normal_url "$PARSED_URL" "$PARSED_TAIL" "$PARSED_KIND"
            fi
          done < "$INPUT_FILE"

          ######################################################################
          # 模块 7：回填目录
          # 只回填 geosite/geoip/classical
          # other-rule 这种目录是直接写到正式目录，不参与临时替换
          ######################################################################

          rm -rf "$TARGET_GEOSITE" "$TARGET_GEOIP"
          mv "$TMP_GEOSITE" "$TARGET_GEOSITE"
          mv "$TMP_GEOIP" "$TARGET_GEOIP"
          mkdir -p "$TARGET_CLASSICAL"

          rm -rf "$TMP_ROOT" "$CACHE_DIR"

      - name: Verify Rules
        shell: bash
        run: |
          set -Eeuo pipefail

          echo "=== Conversion Summary ==="
          echo

          TOTAL_FILES=0
          TOTAL_SIZE=0

          while IFS= read -r f; do
            [ -f "$f" ] || continue
            REL="${f#mihomo/}"
            SIZE="$(stat -c%s "$f" 2>/dev/null || echo "0")"
            echo "  $REL -> ${SIZE} bytes"
            TOTAL_FILES=$((TOTAL_FILES + 1))
            TOTAL_SIZE=$((TOTAL_SIZE + SIZE))
          done < <(find mihomo/rule-set -type f -name "*.mrs" | sort)

          echo
          echo "=== Raw downloaded files ==="
          find mihomo/rule-set -type f ! -name "*.mrs" | sort || true

          echo
          echo "Total mrs files: $TOTAL_FILES, $TOTAL_SIZE bytes"

      - name: Commit and push config
        shell: bash
        run: |
          set -Eeuo pipefail
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"

          git add -A ./mihomo/rule-set

          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update mihomo rules"
          git pull --rebase origin main
          git push origin HEAD:main
