name: mihomo

on:
  workflow_dispatch:
  schedule:
    - cron: '5 20 * * *'

permissions:
  contents: write

concurrency:
  group: rules-main
  cancel-in-progress: false

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Mihomo
        shell: bash
        run: |
          set -Eeuo pipefail
          curl -L -o mihomo.deb https://github.com/MetaCubeX/mihomo/releases/download/v1.19.23/mihomo-linux-amd64-v1.19.23.deb
          mkdir -p temp_deb
          dpkg -x mihomo.deb temp_deb
          mv temp_deb/usr/bin/mihomo ./mihomo-bin
          chmod +x mihomo-bin
          rm -rf temp_deb mihomo.deb

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        shell: bash
        run: |
          set -Eeuo pipefail
          python -m pip install --upgrade pip
          pip install requests pyyaml

      - name: Process Rules
        shell: bash
        run: |
          set -Eeuo pipefail

          python3 << 'EOF'
          import ipaddress
          import re
          import shutil
          import subprocess
          from pathlib import Path

          import requests
          import yaml

          INPUT_FILE = Path("mihomo/mihomo.txt")
          TARGET_ROOT = Path("mihomo/rule-set")
          TARGET_GEOIP = TARGET_ROOT / "geoip"
          TARGET_GEOSITE = TARGET_ROOT / "geosite"
          TARGET_CLASSICAL = TARGET_ROOT / "classical"

          TMP_ROOT = Path("mihomo/.tmp_rule_set")
          TMP_GEOIP = TMP_ROOT / "geoip"
          TMP_GEOSITE = TMP_ROOT / "geosite"
          TMP_CLASSICAL = TMP_ROOT / "classical"

          if not INPUT_FILE.exists():
              raise FileNotFoundError(f"Missing input file: {INPUT_FILE}")

          session = requests.Session()
          session.headers.update({"User-Agent": "Mozilla/5.0"})

          def sanitize_name(name: str) -> str:
              name = re.sub(r"[^A-Za-z0-9_-]", "", name)
              return name or "rule"

          def parse_source_name(line: str) -> tuple[str, str]:
              line = line.strip().replace("\ufeff", "")
              if "@" in line:
                  url, suffix = line.rsplit("@", 1)
                  if "/" not in suffix:
                      return url.strip(), sanitize_name(suffix.strip())
              url = line.strip()
              stem = Path(url.split("?", 1)[0]).stem
              return url, sanitize_name(stem)

          def fetch_text(url: str) -> str:
              resp = session.get(url, timeout=60)
              resp.raise_for_status()
              return resp.text

          def flatten_yaml_payload_or_keep(text: str) -> tuple[str, str]:
              """
              保守逻辑：
              - 如果是 payload yaml，则只把 payload 项逐行摊平，不改每一项内容
              - 否则原样返回
              """
              try:
                  parsed = yaml.safe_load(text)
              except Exception:
                  return text, "text"

              if isinstance(parsed, dict) and isinstance(parsed.get("payload"), list):
                  lines = []
                  for item in parsed["payload"]:
                      if isinstance(item, str):
                          s = item.rstrip("\r\n")
                          if s:
                              lines.append(s)
                  return ("\n".join(lines) + "\n") if lines else "", "yaml_payload"

              return text, "text"

          def effective_lines(flat_text: str) -> list[str]:
              result = []
              for raw in flat_text.splitlines():
                  line = raw.strip().replace("\ufeff", "")
                  if not line:
                      continue
                  if line.startswith("#") or line.startswith("!"):
                      continue
                  result.append(line)
              return result

          def is_cidr_line(line: str) -> bool:
              try:
                  ipaddress.ip_network(line, strict=False)
                  return True
              except Exception:
                  return False

          def is_plain_domain_text_line(line: str) -> bool:
              """
              只接受已是 domain text 的行：
              - 不含逗号
              - 不是 CIDR
              - 不是明显的 classical/other 规则
              - 保留原样，不做 +. / . / DOMAIN-SUFFIX 重写
              """
              if "," in line:
                  return False
              if is_cidr_line(line):
                  return False
              if line.lower() == "payload:":
                  return False
              if re.match(r"^[A-Za-z][A-Za-z0-9+.-]*://", line):
                  return False
              return True

          def classify(lines: list[str]) -> str:
              if not lines:
                  return "empty"

              if all(is_cidr_line(x) for x in lines):
                  return "ipcidr"

              if all(is_plain_domain_text_line(x) for x in lines):
                  return "domain"

              return "classical"

          def write_lines(path: Path, lines: list[str]):
              path.parent.mkdir(parents=True, exist_ok=True)
              with open(path, "w", encoding="utf-8", newline="\n") as f:
                  for line in lines:
                      f.write(line.rstrip("\n") + "\n")

          def compile_mrs(behavior: str, input_path: Path, output_path: Path):
              subprocess.run(
                  ["./mihomo-bin", "convert-ruleset", behavior, "text", str(input_path), str(output_path)],
                  check=True,
              )

          with open(INPUT_FILE, "r", encoding="utf-8") as f:
              sources = [line.strip() for line in f if line.strip() and not line.strip().startswith("#")]

          print(f"Loaded {len(sources)} link(s) from {INPUT_FILE}")
          for idx, item in enumerate(sources, 1):
              print(f"[{idx}] {item}")

          if TMP_ROOT.exists():
              shutil.rmtree(TMP_ROOT)
          TMP_GEOIP.mkdir(parents=True, exist_ok=True)
          TMP_GEOSITE.mkdir(parents=True, exist_ok=True)
          TMP_CLASSICAL.mkdir(parents=True, exist_ok=True)

          for item in sources:
              try:
                  url, name = parse_source_name(item)
                  print(f"Processing: {url} -> {name}")

                  raw_text = fetch_text(url)
                  flat_text, source_kind = flatten_yaml_payload_or_keep(raw_text)
                  lines = effective_lines(flat_text)
                  kind = classify(lines)

                  if kind == "empty":
                      print(f"⚠ No valid lines found: {url}")
                      continue

                  if kind == "ipcidr":
                      txt_path = TMP_GEOIP / f"{name}.txt"
                      mrs_path = TMP_GEOIP / f"{name}.mrs"
                      write_lines(txt_path, lines)
                      compile_mrs("ipcidr", txt_path, mrs_path)
                      print(f"✓ geoip/{name} ({len(lines)} lines)")
                      continue

                  if kind == "domain":
                      list_path = TMP_GEOSITE / f"{name}.list"
                      mrs_path = TMP_GEOSITE / f"{name}.mrs"
                      write_lines(list_path, lines)
                      compile_mrs("domain", list_path, mrs_path)
                      print(f"✓ geosite/{name} ({len(lines)} lines)")
                      continue

                  # classical/mixed: 原样保留“摊平后”的文本，不生成 mrs
                  classical_path = TMP_CLASSICAL / f"{name}.txt"
                  write_lines(classical_path, lines)
                  print(f"⚠ classical/{name} preserved as text only; skipped mrs")

              except subprocess.CalledProcessError as e:
                  print(f"✗ convert failed for {item}: {e}")
              except Exception as e:
                  print(f"✗ error for {item}: {e}")

          TARGET_ROOT.mkdir(parents=True, exist_ok=True)

          for path in (TARGET_GEOIP, TARGET_GEOSITE, TARGET_CLASSICAL):
              if path.exists():
                  shutil.rmtree(path)

          shutil.move(str(TMP_GEOIP), str(TARGET_GEOIP))
          shutil.move(str(TMP_GEOSITE), str(TARGET_GEOSITE))
          shutil.move(str(TMP_CLASSICAL), str(TARGET_CLASSICAL))
          shutil.rmtree(TMP_ROOT, ignore_errors=True)

          def count_files(pattern: str) -> int:
              return len(list(TARGET_ROOT.glob(pattern)))

          print("")
          print("=== Summary ===")
          print(f"geoip txt: {count_files('geoip/*.txt')}")
          print(f"geoip mrs: {count_files('geoip/*.mrs')}")
          print(f"geosite list: {count_files('geosite/*.list')}")
          print(f"geosite mrs: {count_files('geosite/*.mrs')}")
          print(f"classical txt: {count_files('classical/*.txt')}")
          EOF

      - name: Verify Rules
        shell: bash
        run: |
          set -Eeuo pipefail

          echo "=== Conversion Summary ==="
          echo

          TOTAL_FILES=0
          TOTAL_SIZE=0

          for f in mihomo/rule-set/geoip/*.mrs mihomo/rule-set/geosite/*.mrs; do
            [ -f "$f" ] || continue
            REL="${f#mihomo/rule-set/}"
            SIZE="$(stat -c%s "$f" 2>/dev/null || echo "0")"
            echo "  $REL -> ${SIZE} bytes"
            TOTAL_FILES=$((TOTAL_FILES + 1))
            TOTAL_SIZE=$((TOTAL_SIZE + SIZE))
          done

          echo
          echo "Total mrs files: $TOTAL_FILES, $TOTAL_SIZE bytes"

      - name: Commit and push config
        shell: bash
        run: |
          set -Eeuo pipefail
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"

          git add -A ./mihomo/rule-set

          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update mihomo rules"
          git pull --rebase origin main
          git push origin HEAD:main