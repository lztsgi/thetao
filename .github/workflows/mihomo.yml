name: mihomo
on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 20 * * *"

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Mihomo
        shell: bash
        run: |
          curl -L -o mihomo.deb https://github.com/MetaCubeX/mihomo/releases/download/v1.19.23/mihomo-linux-amd64-v1.19.23.deb
          mkdir -p temp_deb
          dpkg -x mihomo.deb temp_deb
          mv temp_deb/usr/bin/mihomo ./mihomo-bin
          chmod +x mihomo-bin
          rm -rf temp_deb mihomo.deb

      - name: Process Rules
        shell: bash
        run: |
          set -Eeuo pipefail

          INPUT_FILE="mihomo/mihomo.txt"
          GEO_DIR="mihomo/rule-set/geoip"
          GEOSITE_DIR="mihomo/rule-set/geosite"
          CACHE_DIR="mihomo/.cache"

          mkdir -p "$GEO_DIR" "$GEOSITE_DIR" "$CACHE_DIR"

          while IFS= read -r line || [[ -n "$line" ]]; do
            [[ "$line" =~ ^[[:space:]]*#.*$ ]] && continue
            [[ -z "${line//[[:space:]]/}" ]] && continue

            URL=""
            FILENAME=""

            if [[ "$line" == *"@"* ]]; then
              LAST_PART="${line##*@}"
              if [[ "$LAST_PART" != */* ]]; then
                URL="${line%@*}"
                FILENAME="$LAST_PART"
              else
                URL="$line"
                FILENAME="$(basename "$URL")"
                FILENAME="${FILENAME%%\?*}"
                FILENAME="${FILENAME%.*}"
              fi
            else
              URL="$line"
              FILENAME="$(basename "$URL")"
              FILENAME="${FILENAME%%\?*}"
              FILENAME="${FILENAME%.*}"
            fi

            FILENAME="$(echo "$FILENAME" | tr -cd '[:alnum:]_-')"
            [[ -z "$FILENAME" ]] && FILENAME="rule_$(date +%s)"

            SRC_FILE="$CACHE_DIR/${FILENAME}.src"
            IP_TMP="$CACHE_DIR/${FILENAME}.ip.tmp"
            DOMAIN_TMP="$CACHE_DIR/${FILENAME}.domain.tmp"

            echo "Processing: $URL -> $FILENAME"

            if ! curl -sL -f --max-time 30 "$URL" -o "$SRC_FILE"; then
              echo "Error: Failed to download $URL"
              rm -f "$SRC_FILE" "$IP_TMP" "$DOMAIN_TMP"
              continue
            fi

            if [[ ! -s "$SRC_FILE" ]]; then
              echo "Error: Downloaded file is empty for $URL"
              rm -f "$SRC_FILE" "$IP_TMP" "$DOMAIN_TMP"
              continue
            fi

            grep -vE "^[[:space:]]*(#|!|$|payload:|DOMAIN|GEOIP|PROCESS-NAME|SRC-PORT|DST-PORT|MATCH)" "$SRC_FILE" | \
            sed -E 's/^[[:space:]]*-[[:space:]]+//' | \
            sed -E 's/^\|\|//g' | \
            sed -E 's/\^$//g' | \
            sed -E 's/^[[:space:]]*(IP-CIDR|IP-CIDR6|IP-ASN|SRC-IP-CIDR)[[:space:]]*,?[[:space:]]*//' | \
            sed -E "s/^['\"+]?//; s/['\"+]?$//" | \
            cut -d',' -f1 | \
            sed 's/[[:space:]]//g' | \
            grep -E "^(([0-9]{1,3}\.){3}[0-9]{1,3}/[0-9]{1,2}|([0-9a-fA-F]{0,4}:){2,7}[0-9a-fA-F]{0,4}/[0-9]{1,3})$" | \
            sort -u > "$IP_TMP" || true

            grep -vE "^[[:space:]]*(IP-CIDR|IP-CIDR6|IP-ASN|SRC-IP-CIDR|#|!|$|payload:|GEOIP|PROCESS-NAME|SRC-PORT|DST-PORT|MATCH)" "$SRC_FILE" | \
            sed -E 's/^[[:space:]]*-[[:space:]]+//' | \
            sed -E 's/^\|\|//g' | \
            sed -E 's/\^$//g' | \
            sed -E "s/^['\"+]?//; s/['\"+]?$//" | \
            awk -F',' '
            {
              gsub(/[[:space:]]/, "", $1)
              gsub(/[[:space:]]/, "", $2)
              type=toupper($1)
              val=$2

              if (type=="DOMAIN-SUFFIX" && val!="") {
                print val
                print "." val
                next
              }
              if ((type=="DOMAIN" || type=="FULL" || type=="FULL:") && val!="") {
                print val
                next
              }
              if (type=="DOMAIN-KEYWORD" || type=="DOMAIN-REGEX") next
              if (tolower($1) ~ /^domain:/ && $2=="") {
                sub(/^domain:/, "", $1)
                print $1
                next
              }
              if ($2=="") {
                print $1
                next
              }
            }
            ' | \
            sed -E 's/^domain://g' | \
            sed -E 's/^\.\.+/./g' | \
            sed -E 's/^\*\.?/./g' | \
            sed -E 's/^\+\././g' | \
            cut -d',' -f1 | \
            sed 's/[[:space:]]//g' | \
            grep -vE "^(no-resolve|force-remote-dns|keyword:|regexp:|\*|.*\*.*\*)$" | \
            grep -v '^$' | \
            sort -u > "$DOMAIN_TMP" || true

            if [[ -s "$IP_TMP" ]] && grep -q "[^[:space:]]" "$IP_TMP"; then
              IP_TXT="$GEO_DIR/${FILENAME}.txt"
              IP_MRS="$GEO_DIR/${FILENAME}.mrs"
              cp "$IP_TMP" "$IP_TXT"
              if ./mihomo-bin convert-ruleset ipcidr text "$IP_TXT" "$IP_MRS"; then
                COUNT="$(wc -l < "$IP_TXT")"
                SIZE="$(stat -c%s "$IP_MRS" 2>/dev/null || echo "0")"
                echo "✓ geoip/$FILENAME ($COUNT rules -> ${SIZE} bytes)"
              else
                echo "✗ Error: Failed to convert geoip/$FILENAME"
                rm -f "$IP_TXT" "$IP_MRS"
              fi
            fi

            if [[ -s "$DOMAIN_TMP" ]] && grep -q "[^[:space:]]" "$DOMAIN_TMP"; then
              DOMAIN_TXT="$GEOSITE_DIR/${FILENAME}.txt"
              DOMAIN_MRS="$GEOSITE_DIR/${FILENAME}.mrs"
              cp "$DOMAIN_TMP" "$DOMAIN_TXT"
              if ./mihomo-bin convert-ruleset domain text "$DOMAIN_TXT" "$DOMAIN_MRS"; then
                COUNT="$(wc -l < "$DOMAIN_TXT")"
                SIZE="$(stat -c%s "$DOMAIN_MRS" 2>/dev/null || echo "0")"
                echo "✓ geosite/$FILENAME ($COUNT rules -> ${SIZE} bytes)"
              else
                echo "✗ Error: Failed to convert geosite/$FILENAME"
                rm -f "$DOMAIN_TXT" "$DOMAIN_MRS"
              fi
            fi

            if [[ ! -s "$IP_TMP" && ! -s "$DOMAIN_TMP" ]]; then
              echo "⚠ Warning: No valid rules found in $FILENAME"
            fi

            rm -f "$SRC_FILE" "$IP_TMP" "$DOMAIN_TMP"
          done < "$INPUT_FILE"

      - name: Verify Rules
        shell: bash
        run: |
          echo "=== Conversion Summary ==="
          echo

          TOTAL_FILES=0
          TOTAL_SIZE=0

          for mrs in mihomo/rule-set/geoip/*.mrs mihomo/rule-set/geosite/*.mrs; do
            [ -f "$mrs" ] || continue
            REL="${mrs#mihomo/rule-set/}"
            SIZE="$(stat -c%s "$mrs" 2>/dev/null || echo "0")"
            echo "  $REL -> ${SIZE} bytes"
            TOTAL_FILES=$((TOTAL_FILES + 1))
            TOTAL_SIZE=$((TOTAL_SIZE + SIZE))
          done

          echo
          echo "Total: $TOTAL_FILES files, $TOTAL_SIZE bytes"

      - name: Push to Repo
        shell: bash
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add mihomo/rule-set/geoip/*.mrs mihomo/rule-set/geoip/*.txt
          git add mihomo/rule-set/geosite/*.mrs mihomo/rule-set/geosite/*.txt
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          else
            git commit -m "Update mihomo rules: $(date '+%Y-%m-%d %H:%M:%S')"
            git push
          fi
