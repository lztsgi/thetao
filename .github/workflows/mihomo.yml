name: mihomo

on:
  workflow_dispatch:
  schedule:
    - cron: '5 20 * * *'

permissions:
  contents: write

concurrency:
  group: rules-main
  cancel-in-progress: false

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Mihomo
        shell: bash
        run: |
          set -Eeuo pipefail
          curl -L -o mihomo.deb https://github.com/MetaCubeX/mihomo/releases/download/v1.19.23/mihomo-linux-amd64-v1.19.23.deb
          mkdir -p temp_deb
          dpkg -x mihomo.deb temp_deb
          mv temp_deb/usr/bin/mihomo ./mihomo-bin
          chmod +x mihomo-bin
          rm -rf temp_deb mihomo.deb

      - name: Process Rules
        shell: bash
        run: |
          set -Eeuo pipefail

          INPUT_FILE="mihomo/mihomo.txt"
          TARGET_ROOT="mihomo/rule-set"
          TARGET_GEO="$TARGET_ROOT/geoip"
          TARGET_GEOSITE="$TARGET_ROOT/geosite"

          TMP_ROOT="mihomo/.tmp_rule_set"
          TMP_GEO="$TMP_ROOT/geoip"
          TMP_GEOSITE="$TMP_ROOT/geosite"
          CACHE_DIR="mihomo/.cache"

          if [[ ! -f "$INPUT_FILE" ]]; then
            echo "Missing input file: $INPUT_FILE"
            exit 1
          fi

          rm -rf "$TMP_ROOT" "$CACHE_DIR"
          mkdir -p "$TMP_GEO" "$TMP_GEOSITE" "$CACHE_DIR"

          mapfile -t LINES < <(grep -vE '^[[:space:]]*#' "$INPUT_FILE" | sed '/^[[:space:]]*$/d')

          echo "Loaded ${#LINES[@]} link(s) from $INPUT_FILE"
          for i in "${!LINES[@]}"; do
            echo "[$((i+1))] ${LINES[$i]}"
          done

          for line in "${LINES[@]}"; do
            URL=""
            FILENAME=""

            if [[ "$line" == *"@"* ]]; then
              LAST_PART="${line##*@}"
              if [[ "$LAST_PART" != */* ]]; then
                URL="${line%@*}"
                FILENAME="$LAST_PART"
              else
                URL="$line"
                FILENAME="$(basename "$URL")"
                FILENAME="${FILENAME%%\?*}"
                FILENAME="${FILENAME%.*}"
              fi
            else
              URL="$line"
              FILENAME="$(basename "$URL")"
              FILENAME="${FILENAME%%\?*}"
              FILENAME="${FILENAME%.*}"
            fi

            FILENAME="$(echo "$FILENAME" | tr -cd '[:alnum:]_-')"
            [[ -z "$FILENAME" ]] && FILENAME="rule_$(date +%s)"

            SRC_FILE="$CACHE_DIR/${FILENAME}.src"
            IP_TMP="$CACHE_DIR/${FILENAME}.ip.tmp"
            DOMAIN_TMP="$CACHE_DIR/${FILENAME}.domain.tmp"

            echo "Processing: $URL -> $FILENAME"

            if ! curl -sL -f --max-time 60 "$URL" -o "$SRC_FILE"; then
              echo "Error: Failed to download $URL"
              rm -f "$SRC_FILE" "$IP_TMP" "$DOMAIN_TMP"
              continue
            fi

            if [[ ! -s "$SRC_FILE" ]]; then
              echo "Error: Downloaded file is empty for $URL"
              rm -f "$SRC_FILE" "$IP_TMP" "$DOMAIN_TMP"
              continue
            fi

            # 提取 IP 规则，导出为纯 CIDR 文本
            grep -vE "^[[:space:]]*(#|!|$|payload:|DOMAIN|GEOIP|PROCESS-NAME|SRC-PORT|DST-PORT|MATCH)" "$SRC_FILE" | \
            sed -E 's/^[[:space:]]*-[[:space:]]+//' | \
            sed -E 's/^\|\|//g' | \
            sed -E 's/\^$//g' | \
            sed -E 's/^[[:space:]]*(IP-CIDR|IP-CIDR6|IP-ASN|SRC-IP-CIDR)[[:space:]]*,?[[:space:]]*//' | \
            sed -E "s/^['\"+]?//; s/['\"+]?$//" | \
            cut -d',' -f1 | \
            sed 's/[[:space:]]//g' | \
            grep -E "^(([0-9]{1,3}\.){3}[0-9]{1,3}/[0-9]{1,2}|([0-9a-fA-F]{0,4}:){2,7}[0-9a-fA-F]{0,4}/[0-9]{1,3})$" | \
            sort -u > "$IP_TMP" || true

            # 提取域名规则，导出为 Mihomo list 风格：
            # DOMAIN-SUFFIX => +.example.com
            # DOMAIN/FULL    => example.com
            awk '
            function trim(s) {
              gsub(/^[ \t\r\n]+|[ \t\r\n]+$/, "", s)
              return s
            }
            function emit_suffix(v) {
              v = trim(v)
              gsub(/^'\''|'\''$/, "", v)
              gsub(/^"|"$/, "", v)
              gsub(/^\+\./, "", v)
              gsub(/^\./, "", v)
              gsub(/^\*\./, "", v)
              if (v != "") print "+." v
            }
            function emit_domain(v) {
              v = trim(v)
              gsub(/^'\''|'\''$/, "", v)
              gsub(/^"|"$/, "", v)
              gsub(/^\+\./, "", v)
              gsub(/^\./, "", v)
              gsub(/^\*\./, "", v)
              if (v != "") print v
            }

            {
              line = $0
              gsub(/\r/, "", line)
              line = trim(line)

              if (line == "" || line ~ /^#/ || line ~ /^!/ || line == "payload:") next
              sub(/^[[:space:]]*-[[:space:]]+/, "", line)
              line = trim(line)

              if (line ~ /^(IP-CIDR|IP-CIDR6|IP-ASN|SRC-IP-CIDR|GEOIP|PROCESS-NAME|SRC-PORT|DST-PORT|MATCH)(,|$)/) next

              if (line ~ /^DOMAIN-SUFFIX,/) {
                split(line, a, ",")
                emit_suffix(a[2])
                next
              }

              if (line ~ /^(HOST-SUFFIX|host-suffix),/) {
                split(line, a, ",")
                emit_suffix(a[2])
                next
              }

              if (line ~ /^(DOMAIN|HOST|host|FULL|FULL:),/) {
                split(line, a, ",")
                emit_domain(a[2])
                next
              }

              if (line ~ /^(DOMAIN-KEYWORD|DOMAIN-REGEX|HOST-KEYWORD|host-keyword|URL-REGEX),/) next

              if (line ~ /^\|\|/) {
                sub(/^\|\|/, "", line)
                sub(/\^$/, "", line)
                emit_suffix(line)
                next
              }

              if (line ~ /^\+\./) {
                emit_suffix(line)
                next
              }

              if (line ~ /^\./) {
                emit_suffix(line)
                next
              }

              if (line ~ /^[A-Za-z0-9_-]+:/) {
                next
              }

              if (line !~ /,/ && line !~ /\//) {
                emit_domain(line)
                next
              }
            }
            ' "$SRC_FILE" | \
            sed 's/[[:space:]]//g' | \
            grep -v '^$' | \
            sort -u > "$DOMAIN_TMP" || true

            if [[ -s "$IP_TMP" ]] && grep -q "[^[:space:]]" "$IP_TMP"; then
              IP_TXT="$TMP_GEO/${FILENAME}.txt"
              IP_MRS="$TMP_GEO/${FILENAME}.mrs"
              cp "$IP_TMP" "$IP_TXT"

              if ./mihomo-bin convert-ruleset ipcidr text "$IP_TXT" "$IP_MRS"; then
                COUNT="$(wc -l < "$IP_TXT")"
                SIZE="$(stat -c%s "$IP_MRS" 2>/dev/null || echo "0")"
                echo "✓ geoip/$FILENAME ($COUNT rules -> ${SIZE} bytes)"
              else
                echo "✗ Error: Failed to convert geoip/$FILENAME"
                rm -f "$IP_TXT" "$IP_MRS"
              fi
            fi

            if [[ -s "$DOMAIN_TMP" ]] && grep -q "[^[:space:]]" "$DOMAIN_TMP"; then
              DOMAIN_TXT="$TMP_GEOSITE/${FILENAME}.list"
              DOMAIN_MRS="$TMP_GEOSITE/${FILENAME}.mrs"
              cp "$DOMAIN_TMP" "$DOMAIN_TXT"

              if ./mihomo-bin convert-ruleset domain text "$DOMAIN_TXT" "$DOMAIN_MRS"; then
                COUNT="$(wc -l < "$DOMAIN_TXT")"
                SIZE="$(stat -c%s "$DOMAIN_MRS" 2>/dev/null || echo "0")"
                echo "✓ geosite/$FILENAME ($COUNT rules -> ${SIZE} bytes)"
              else
                echo "✗ Error: Failed to convert geosite/$FILENAME"
                rm -f "$DOMAIN_TXT" "$DOMAIN_MRS"
              fi
            fi

            if [[ ! -s "$IP_TMP" && ! -s "$DOMAIN_TMP" ]]; then
              echo "⚠ Warning: No valid rules found in $FILENAME"
            fi

            rm -f "$SRC_FILE" "$IP_TMP" "$DOMAIN_TMP"
          done

          mkdir -p "$TARGET_ROOT"

          rm -rf "$TARGET_GEO" "$TARGET_GEOSITE"
          mv "$TMP_GEO" "$TARGET_GEO"
          mv "$TMP_GEOSITE" "$TARGET_GEOSITE"

          rm -rf "$TMP_ROOT" "$CACHE_DIR"

      - name: Verify Rules
        shell: bash
        run: |
          set -Eeuo pipefail

          echo "=== Conversion Summary ==="
          echo

          TOTAL_FILES=0
          TOTAL_SIZE=0

          for mrs in mihomo/rule-set/geoip/*.mrs mihomo/rule-set/geosite/*.mrs; do
            [ -f "$mrs" ] || continue
            REL="${mrs#mihomo/rule-set/}"
            SIZE="$(stat -c%s "$mrs" 2>/dev/null || echo "0")"
            echo "  $REL -> ${SIZE} bytes"
            TOTAL_FILES=$((TOTAL_FILES + 1))
            TOTAL_SIZE=$((TOTAL_SIZE + SIZE))
          done

          echo
          echo "Total: $TOTAL_FILES files, $TOTAL_SIZE bytes"

      - name: Commit and push config
        shell: bash
        run: |
          set -Eeuo pipefail
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"

          git add -A ./mihomo/rule-set

          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update mihomo rules"
          git pull --rebase origin main
          git push origin HEAD:main