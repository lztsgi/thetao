name: singbox
on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 20 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup sing-box
        env:
          SING_BOX_DEB_URL: "https://github.com/SagerNet/sing-box/releases/download/v1.13.6/sing-box_1.13.6_linux_amd64.deb"
        run: |
          set -Eeuo pipefail
          wget -O sing-box.deb "$SING_BOX_DEB_URL"
          sudo dpkg -i sing-box.deb

      - name: Set up Python3
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pyyaml

      - name: Run Python script
        working-directory: ./singbox
        run: |
          python3 << 'EOF'
          import json
          import os
          import re
          import ipaddress
          import subprocess
          from pathlib import Path

          import requests
          import yaml

          DOMAIN_KEYS = {"domain", "domain_suffix", "domain_keyword", "domain_regex"}
          IP_KEYS = {"ip_cidr", "source_ip_cidr", "geoip"}

          MAP_DICT = {
              "DOMAIN-SUFFIX": "domain_suffix",
              "HOST-SUFFIX": "domain_suffix",
              "host-suffix": "domain_suffix",
              "DOMAIN": "domain",
              "HOST": "domain",
              "host": "domain",
              "FULL": "domain",
              "FULL:": "domain",
              "DOMAIN-KEYWORD": "domain_keyword",
              "HOST-KEYWORD": "domain_keyword",
              "host-keyword": "domain_keyword",
              "URL-REGEX": "domain_regex",
              "DOMAIN-REGEX": "domain_regex",
              "IP-CIDR": "ip_cidr",
              "ip-cidr": "ip_cidr",
              "IP-CIDR6": "ip_cidr",
              "IP6-CIDR": "ip_cidr",
              "SRC-IP-CIDR": "source_ip_cidr",
              "GEOIP": "geoip",
          }

          session = requests.Session()
          session.headers.update({"User-Agent": "Mozilla/5.0"})

          def is_cidr(value: str) -> bool:
              try:
                  ipaddress.ip_network(value, strict=False)
                  return True
              except Exception:
                  return False

          def parse_source_name(line: str) -> tuple[str, str]:
              if "@" in line:
                  url, last = line.rsplit("@", 1)
                  if "/" not in last:
                      return url.strip(), re.sub(r"[^A-Za-z0-9_-]", "", last.strip()) or "rule"
              url = line.strip()
              name = Path(url.split("?", 1)[0]).stem
              name = re.sub(r"[^A-Za-z0-9_-]", "", name)
              return url, name or "rule"

          def fetch_text(url: str) -> str:
              resp = session.get(url, timeout=30)
              resp.raise_for_status()
              return resp.text

          def add_rule(bucket: dict, key: str, value: str):
              value = value.strip().strip("'").strip('"')
              if not value:
                  return
              if key == "domain_suffix":
                  value = value.lstrip("+").lstrip(".")
                  if value:
                      bucket["domain_suffix"].add(value)
                  return
              if key == "domain":
                  value = value.lstrip("+")
                  if value.startswith("."):
                      bucket["domain_suffix"].add(value.lstrip("."))
                  else:
                      bucket["domain"].add(value)
                  return
              if key in ("domain_keyword", "domain_regex", "ip_cidr", "source_ip_cidr", "geoip"):
                  bucket[key].add(value)

          def parse_yaml_payload(text: str):
              parsed = yaml.safe_load(text)
              items = parsed.get("payload", []) if isinstance(parsed, dict) else None
              if not isinstance(items, list):
                  return None

              bucket = {
                  "domain": set(),
                  "domain_suffix": set(),
                  "domain_keyword": set(),
                  "domain_regex": set(),
                  "ip_cidr": set(),
                  "source_ip_cidr": set(),
                  "geoip": set(),
              }

              for item in items:
                  if not isinstance(item, str):
                      continue
                  item = item.strip()
                  if not item:
                      continue
                  if "," not in item:
                      if is_cidr(item):
                          add_rule(bucket, "ip_cidr", item)
                      else:
                          add_rule(bucket, "domain", item)
                      continue

                  pattern, value = item.split(",", 1)
                  value = value.split(",", 1)[0]
                  mapped = MAP_DICT.get(pattern.strip())
                  if mapped:
                      add_rule(bucket, mapped, value.strip())

              return bucket

          def parse_text_lines(text: str):
              bucket = {
                  "domain": set(),
                  "domain_suffix": set(),
                  "domain_keyword": set(),
                  "domain_regex": set(),
                  "ip_cidr": set(),
                  "source_ip_cidr": set(),
                  "geoip": set(),
              }

              for raw in text.splitlines():
                  line = raw.strip()
                  if not line or line.startswith("#") or line.startswith("!") or line == "payload:":
                      continue
                  if line.startswith("- "):
                      line = line[2:].strip()

                  line = line.strip("'").strip('"')
                  line = line.replace("||", "", 1) if line.startswith("||") else line
                  if line.endswith("^"):
                      line = line[:-1]

                  if "," not in line:
                      if is_cidr(line):
                          add_rule(bucket, "ip_cidr", line)
                      else:
                          add_rule(bucket, "domain", line)
                      continue

                  pattern, value = line.split(",", 1)
                  value = value.split(",", 1)[0].strip()
                  mapped = MAP_DICT.get(pattern.strip())
                  if mapped:
                      add_rule(bucket, mapped, value)

              return bucket

          def build_rules(bucket: dict, wanted_keys: set[str]) -> dict | None:
              rules = []
              for key in ["domain", "domain_suffix", "domain_keyword", "domain_regex", "ip_cidr", "source_ip_cidr", "geoip"]:
                  if key not in wanted_keys:
                      continue
                  values = sorted(bucket[key])
                  if values:
                      rules.append({key: values})
              if not rules:
                  return None
              return {"version": 3, "rules": rules}

          def write_ruleset(base_dir: Path, name: str, rules: dict):
              base_dir.mkdir(parents=True, exist_ok=True)
              json_path = base_dir / f"{name}.json"
              srs_path = base_dir / f"{name}.srs"
              with open(json_path, "w", encoding="utf-8") as f:
                  json.dump(rules, f, ensure_ascii=False, indent=2)
              subprocess.run(
                  ["sing-box", "rule-set", "compile", "--output", str(srs_path), str(json_path)],
                  check=True,
              )
              print(f"✓ {json_path}")

          input_file = Path("singbox.txt")
          geo_dir = Path("rule-set/geo")
          geosite_dir = Path("rule-set/geosite")

          geo_dir.mkdir(parents=True, exist_ok=True)
          geosite_dir.mkdir(parents=True, exist_ok=True)

          with open(input_file, "r", encoding="utf-8") as f:
              links = [line.strip() for line in f if line.strip() and not line.strip().startswith("#")]

          for line in links:
              try:
                  url, name = parse_source_name(line)
                  text = fetch_text(url)

                  bucket = None
                  if url.endswith(".yaml") or url.endswith(".yml"):
                      try:
                          bucket = parse_yaml_payload(text)
                      except Exception:
                          bucket = None
                  if bucket is None:
                      bucket = parse_text_lines(text)

                  domain_rules = build_rules(bucket, DOMAIN_KEYS)
                  ip_rules = build_rules(bucket, IP_KEYS)

                  if domain_rules:
                      write_ruleset(geosite_dir, name, domain_rules)
                  if ip_rules:
                      write_ruleset(geo_dir, name, ip_rules)

                  if not domain_rules and not ip_rules:
                      print(f"⚠ No valid rules found: {url}")
              except Exception as e:
                  print(f"获取链接出错,已跳过: {line}, 原因: {e}")

          EOF

      - name: Commit and push config
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git add ./singbox/rule-set/geo/*.json ./singbox/rule-set/geo/*.srs
          git add ./singbox/rule-set/geosite/*.json ./singbox/rule-set/geosite/*.srs
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          else
            git commit -m "Update sing-box rules"
            git push
          fi
