name: singbox

on:
  workflow_dispatch:
  schedule:
    - cron: '0 20 * * *'

permissions:
  contents: write

concurrency:
  group: rules-main
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup sing-box
        env:
          SING_BOX_DEB_URL: "https://github.com/SagerNet/sing-box/releases/download/v1.13.6/sing-box_1.13.6_linux_amd64.deb"
        run: |
          set -Eeuo pipefail
          wget -O sing-box.deb "$SING_BOX_DEB_URL"
          sudo dpkg -i sing-box.deb

      - name: Set up Python3
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          set -Eeuo pipefail
          python -m pip install --upgrade pip
          pip install pandas requests pyyaml

      - name: Run Python script
        working-directory: ./singbox
        run: |
          python3 << 'EOF'
          import pandas as pd
          import re
          import concurrent.futures
          import os
          import json
          import requests
          import yaml
          import ipaddress
          from io import StringIO
          from urllib.parse import urldefrag

          # =========================================================
          # 1) 基础映射配置
          # =========================================================
          MAP_DICT = {
              'DOMAIN-SUFFIX': 'domain_suffix',
              'HOST-SUFFIX': 'domain_suffix',
              'host-suffix': 'domain_suffix',
              'DOMAIN': 'domain',
              'HOST': 'domain',
              'host': 'domain',
              'DOMAIN-KEYWORD': 'domain_keyword',
              'HOST-KEYWORD': 'domain_keyword',
              'host-keyword': 'domain_keyword',
              'IP-CIDR': 'ip_cidr',
              'ip-cidr': 'ip_cidr',
              'IP-CIDR6': 'ip_cidr',
              'IP6-CIDR': 'ip_cidr',
              'SRC-IP-CIDR': 'source_ip_cidr',
              'GEOIP': 'geoip',
              'DST-PORT': 'port',
              'SRC-PORT': 'source_port',
              'URL-REGEX': 'domain_regex',
              'DOMAIN-REGEX': 'domain_regex'
          }

          IP_ONLY_KEYS = {'ip_cidr', 'source_ip_cidr', 'geoip'}

          # =========================================================
          # 2) 读取远程规则文件
          # =========================================================
          def read_yaml_from_url(url):
              headers = {'User-Agent': 'Mozilla/5.0'}
              response = requests.get(url, headers=headers, timeout=60)
              response.raise_for_status()
              yaml_data = yaml.safe_load(response.text)
              return yaml_data

          def read_list_from_url(url):
              headers = {'User-Agent': 'Mozilla/5.0'}
              response = requests.get(url, headers=headers, timeout=60)
              if response.status_code == 200:
                  csv_data = StringIO(response.text)
                  df = pd.read_csv(
                      csv_data,
                      header=None,
                      names=['pattern', 'address', 'other', 'other2', 'other3'],
                      on_bad_lines='skip'
                  )
              else:
                  return None

              filtered_rows = []
              rules = []

              if 'AND' in df['pattern'].values:
                  and_rows = df[df['pattern'].str.contains('AND', na=False)]
                  for _, row in and_rows.iterrows():
                      rule = {
                          "type": "logical",
                          "mode": "and",
                          "rules": []
                      }
                      pattern = ",".join(row.values.astype(str))
                      components = re.findall(r'\((.*?)\)', pattern)
                      for component in components:
                          for keyword in MAP_DICT.keys():
                              if keyword in component:
                                  match = re.search(f'{keyword},(.*)', component)
                                  if match:
                                      value = match.group(1)
                                      rule["rules"].append({
                                          MAP_DICT[keyword]: value
                                      })
                      rules.append(rule)

              for _, row in df.iterrows():
                  if 'AND' not in str(row['pattern']):
                      filtered_rows.append(row)

              df_filtered = pd.DataFrame(
                  filtered_rows,
                  columns=['pattern', 'address', 'other', 'other2', 'other3']
              )
              return df_filtered, rules

          # =========================================================
          # 3) 规则类型识别与解析
          # =========================================================
          def is_ipv4_or_ipv6(address):
              try:
                  ipaddress.IPv4Network(address)
                  return 'ipv4'
              except ValueError:
                  try:
                      ipaddress.IPv6Network(address)
                      return 'ipv6'
                  except ValueError:
                      return None

          def parse_and_convert_to_dataframe(link):
              rules = []
              if link.endswith('.yaml') or link.endswith('.txt'):
                  try:
                      yaml_data = read_yaml_from_url(link)
                      rows = []
                      if not isinstance(yaml_data, str):
                          items = yaml_data.get('payload', [])
                      else:
                          lines = yaml_data.splitlines()
                          line_content = lines[0] if lines else ""
                          items = line_content.split()

                      for item in items:
                          address = item.strip("'")
                          if ',' not in item:
                              if is_ipv4_or_ipv6(item):
                                  pattern = 'IP-CIDR'
                              else:
                                  if address.startswith('+') or address.startswith('.'):
                                      pattern = 'DOMAIN-SUFFIX'
                                      address = address[1:]
                                      if address.startswith('.'):
                                          address = address[1:]
                                  else:
                                      pattern = 'DOMAIN'
                          else:
                              pattern, address = item.split(',', 1)
                              if ',' in address:
                                  address = address.split(',', 1)[0]

                          rows.append({
                              'pattern': pattern.strip(),
                              'address': address.strip(),
                              'other': None
                          })

                      df = pd.DataFrame(rows, columns=['pattern', 'address', 'other'])
                  except Exception:
                      df, rules = read_list_from_url(link)
              else:
                  df, rules = read_list_from_url(link)

              return df, rules

          def sort_dict(obj):
              if isinstance(obj, dict):
                  return {k: sort_dict(obj[k]) for k in sorted(obj)}
              elif isinstance(obj, list) and all(isinstance(elem, dict) for elem in obj):
                  return sorted([sort_dict(x) for x in obj], key=lambda d: sorted(d.keys())[0])
              elif isinstance(obj, list):
                  return sorted(sort_dict(x) for x in obj)
              else:
                  return obj

          def choose_output_directory(result_rules, geo_output_directory, geosite_output_directory):
              rule_keys = set()
              for rule in result_rules.get("rules", []):
                  rule_keys.update(rule.keys())

              if rule_keys and rule_keys.issubset(IP_ONLY_KEYS):
                  return geo_output_directory
              return geosite_output_directory

          # =========================================================
          # 4) sing-box 编译
          # =========================================================
          def compile_json_to_srs(json_path):
              srs_path = os.path.splitext(json_path)[0] + ".srs"
              rc = os.system(f'sing-box rule-set compile --output "{srs_path}" "{json_path}"')
              return rc == 0, srs_path

          # =========================================================
          # 5) 特殊链接解析
          #    支持：
          #    #release-assets@other-rule
          #    #release-assets@rule-set/other
          #    #release-assets@/rule-set/other
          # =========================================================
          def parse_special_link(raw_link):
              clean_link, fragment = urldefrag(raw_link.strip())
              mode = None
              output_subdir = None

              if fragment:
                  parts = fragment.split('@', 1)
                  mode = parts[0].strip() if parts[0].strip() else None
                  if len(parts) > 1:
                      output_subdir = parts[1].strip() if parts[1].strip() else None

              return clean_link, mode, output_subdir

          def normalize_repo_relative_dir(path_value, default_dir="./rule-set/other-rule"):
              if not path_value:
                  return os.path.normpath(default_dir)

              p = path_value.strip().replace("\\", "/")

              while p.startswith("/"):
                  p = p[1:]

              while p.startswith("./"):
                  p = p[2:]

              if not p:
                  return os.path.normpath(default_dir)

              if not p.startswith("rule-set/"):
                  p = f"rule-set/{p}"

              return os.path.normpath(f"./{p}")

          # =========================================================
          # 6) 下载 GitHub Release Assets
          # =========================================================
          def download_github_release_assets(tag_url, output_directory):
              headers = {
                  'User-Agent': 'Mozilla/5.0',
                  'Accept': 'application/vnd.github+json'
              }

              clean_url, _ = urldefrag(tag_url)
              m = re.match(r'https://github\.com/([^/]+)/([^/]+)/releases/tag/([^/#]+)', clean_url)
              if not m:
                  raise ValueError(f"不是有效的 GitHub release tag 链接: {tag_url}")

              owner, repo, tag = m.groups()
              api_url = f"https://api.github.com/repos/{owner}/{repo}/releases/tags/{tag}"

              response = requests.get(api_url, headers=headers, timeout=60)
              response.raise_for_status()
              release_data = response.json()

              os.makedirs(output_directory, exist_ok=True)

              for asset in release_data.get("assets", []):
                  asset_name = (asset.get("name") or "").strip()
                  download_url = asset.get("browser_download_url")

                  if not asset_name or not download_url:
                      continue

                  if asset_name.startswith("Source code") or asset_name in {"Source code (zip)", "Source code (tar.gz)"}:
                      continue

                  save_path = os.path.join(output_directory, asset_name)

                  asset_resp = requests.get(download_url, headers=headers, stream=True, timeout=120)
                  asset_resp.raise_for_status()

                  with open(save_path, "wb") as f:
                      for chunk in asset_resp.iter_content(chunk_size=8192):
                          if chunk:
                              f.write(chunk)

                  print(f"已下载 release asset: {os.path.relpath(save_path, '.')}")

          # =========================================================
          # 7) 原有规则转换逻辑
          # =========================================================
          def parse_list_file(link, geo_output_directory, geosite_output_directory):
              try:
                  if '@' in link:
                      parts = link.rsplit('@', 1)
                      url = parts[0]
                      custom_name = parts[1] if len(parts) > 1 and '/' not in parts[1] else None
                      if custom_name:
                          base_filename = custom_name
                      else:
                          base_filename = os.path.basename(url).split('.')[0]
                  else:
                      url = link
                      base_filename = os.path.basename(url).split('.')[0]

                  with concurrent.futures.ThreadPoolExecutor() as executor:
                      results = list(executor.map(parse_and_convert_to_dataframe, [url]))
                      dfs = [df for df, rules in results if df is not None]
                      rules_list = [rules for df, rules in results if df is not None]

                      if not dfs:
                          raise ValueError(f"未能解析规则内容: {url}")

                      df = pd.concat(dfs, ignore_index=True)
                      df = df[~df['pattern'].astype(str).str.contains('#', na=False)].reset_index(drop=True)
                      df = df[df['pattern'].isin(MAP_DICT.keys())].reset_index(drop=True)
                      df = df.drop_duplicates().reset_index(drop=True)
                      df['pattern'] = df['pattern'].replace(MAP_DICT)

                      result_rules = {"version": 3, "rules": []}
                      domain_entries = []

                      for pattern, addresses in df.groupby('pattern')['address'].apply(list).to_dict().items():
                          if pattern == 'domain_suffix':
                              rule_entry = {pattern: [address.strip() for address in addresses]}
                              result_rules["rules"].append(rule_entry)
                          elif pattern == 'domain':
                              domain_entries.extend([address.strip() for address in addresses])
                          else:
                              rule_entry = {pattern: [address.strip() for address in addresses]}
                              result_rules["rules"].append(rule_entry)

                      for extra_rules in rules_list:
                          if extra_rules:
                              result_rules["rules"].extend(extra_rules)

                      domain_entries = list(set(domain_entries))
                      if domain_entries:
                          result_rules["rules"].insert(0, {'domain': domain_entries})

                      output_directory = choose_output_directory(
                          result_rules,
                          geo_output_directory,
                          geosite_output_directory
                      )

                      os.makedirs(output_directory, exist_ok=True)

                      file_name = os.path.join(output_directory, f"{base_filename}.json")
                      with open(file_name, 'w', encoding='utf-8') as output_file:
                          result_rules_str = json.dumps(sort_dict(result_rules), ensure_ascii=False, indent=2)
                          result_rules_str = result_rules_str.replace('\\\\', '\\')
                          output_file.write(result_rules_str)

                      ok, srs_path = compile_json_to_srs(file_name)
                      if not ok:
                          print(f"编译失败: {file_name}")

                      return os.path.relpath(file_name, ".")

              except Exception as e:
                  print(f'获取链接出错,已跳过:{link},原因:{str(e)}')
                  return None

          # =========================================================
          # 8) 编译本地手动 json
          # =========================================================
          def compile_manual_local_jsons(geo_output_dir, geosite_output_dir):
              local_jsons = []

              for base_dir in [geo_output_dir, geosite_output_dir]:
                  if not os.path.exists(base_dir):
                      continue
                  for entry in os.listdir(base_dir):
                      if entry.endswith(".json"):
                          rel_path = os.path.relpath(os.path.join(base_dir, entry), ".")
                          local_jsons.append(rel_path)

              manual_jsons = sorted(set(local_jsons))

              for rel_json in manual_jsons:
                  abs_json = os.path.join(".", rel_json)
                  ok, srs_path = compile_json_to_srs(abs_json)
                  if ok:
                      print(f"本地手动 json 已编译: {rel_json}")
                  else:
                      print(f"本地手动 json 编译失败: {rel_json}")

          # =========================================================
          # 9) 主流程
          # =========================================================
          with open("singbox.txt", 'r', encoding='utf-8') as links_file:
              links = links_file.read().splitlines()

          links = [l for l in links if l.strip() and not l.strip().startswith("#")]

          geo_output_dir = "./rule-set/geo"
          geosite_output_dir = "./rule-set/geosite"
          default_other_rule_output_dir = "./rule-set/other-rule"

          os.makedirs(geo_output_dir, exist_ok=True)
          os.makedirs(geosite_output_dir, exist_ok=True)
          os.makedirs(default_other_rule_output_dir, exist_ok=True)

          for raw_link in links:
              link, mode, output_subdir = parse_special_link(raw_link)

              if mode == "release-assets":
                  try:
                      target_dir = normalize_repo_relative_dir(
                          output_subdir,
                          default_dir=default_other_rule_output_dir
                      )
                      os.makedirs(target_dir, exist_ok=True)

                      download_github_release_assets(
                          link,
                          target_dir
                      )
                  except Exception as e:
                      print(f'下载 release assets 出错,已跳过:{raw_link},原因:{str(e)}')
                  continue

              parse_list_file(
                  raw_link,
                  geo_output_directory=geo_output_dir,
                  geosite_output_directory=geosite_output_dir
              )

          compile_manual_local_jsons(geo_output_dir, geosite_output_dir)
          EOF

      - name: Commit and push config
        run: |
          set -Eeuo pipefail
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"

          git add -A ./singbox/rule-set

          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update sing-box rules"
          git pull --rebase origin main
          git push origin HEAD:main
